<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Keepsake, For You</title>
  <meta name="description" content="A voice note, kept just for you." />

  <meta property="og:title" content="A Keepsake, For You" />
  <meta property="og:description" content="Someone made you a voice note keepsake." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,500&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="grain" aria-hidden="true"></div>

  <main class="stage">

    <!-- Closed state: the tape case, waiting to be opened -->
    <section class="case" id="case">
      <button class="case-open" id="openBtn" aria-label="Open the keepsake and press play">
        <span class="eyebrow">a keepsake tape</span>
        <h1 class="case-title">For <span data-field="recipientName">You</span></h1>
        <p class="case-hint">from <span data-field="senderName">Someone</span></p>
        <span class="case-icon" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none">
            <path d="M12 8L26 17L12 26V8Z" fill="currentColor"/>
          </svg>
        </span>
        <span class="case-tap-hint">tap to open</span>
      </button>
    </section>

    <!-- Open state: the player -->
    <section class="player" id="player" hidden aria-hidden="true">

      <div class="player-head">
        <span class="eyebrow">a voice note, kept</span>
        <h1 class="player-title">For <span data-field="recipientName">You</span></h1>
        <p class="player-sub">— <span data-field="senderName">Someone</span></p>
      </div>

      <div class="tape" id="tape">
        <div class="reel reel-left" id="reelLeft"><div class="reel-hub"></div></div>

        <div class="tape-window">
          <canvas id="waveform" class="waveform" aria-hidden="true"></canvas>
        </div>

        <div class="reel reel-right" id="reelRight"><div class="reel-hub"></div></div>
      </div>

      <div class="controls">
        <button id="playBtn" class="play-btn" aria-label="Play voice note">
          <svg class="icon-play" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M4 2.5L15 9L4 15.5V2.5Z" fill="currentColor"/>
          </svg>
          <svg class="icon-pause" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true" hidden>
            <rect x="4" y="2.5" width="3.5" height="13" fill="currentColor"/>
            <rect x="10.5" y="2.5" width="3.5" height="13" fill="currentColor"/>
          </svg>
        </button>

        <div class="counter" aria-live="off">
          <span id="currentTime">00:00</span><span class="counter-sep">/</span><span id="duration">00:00</span>
        </div>

        <label class="scrubber-label" for="scrubber">Seek</label>
        <input type="range" id="scrubber" class="scrubber" min="0" max="100" value="0" step="0.1" />
      </div>

      <audio id="audio" src="assets/audio/voice-note.mp3" preload="metadata"></audio>

      <p class="message" id="message"></p>

      <figure class="keepsake-photo" id="keepsakePhoto">
        <img src="assets/images/photo.svg" alt="A keepsake photo" id="photo" />
        <figcaption id="photoCaption">a moment, pinned here</figcaption>
      </figure>

    </section>

  </main>

  <footer class="footer">
    <span>kept safe since <span id="dateStamp"></span></span>
  </footer>

  <script src="js/script.js"></script>
</body>
</html>
